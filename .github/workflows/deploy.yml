name: CI/CD - Deploy to K3s on EC2
on:
  push:
    branches: [ "main"]

jobs:
    deploy:
        env:
         FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ap-south-1

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, Tag, and Push Image to ECR
              id: build-image
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                ECR_REPOSITORY: pr-summarizer-bot
                IMAGE_TAG: latest
              run: |
                docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            - name: Deploy to EC2 K3s via AWS SSM
              run: |
                aws ssm send-command \
                  --instance-ids "i-09f1eaba8c5e22626"\
                  --document-name "AWS-RunShellScript" \
                  --region ap-south-1\
                  --parameters commands='[
                    "TOKEN=$(aws ecr get-login-password --region ap-south-1)",
                    "sudo kubectl delete secret ecr-registry-key || true",
                    "sudo kubectl create secret docker-registry ecr-registry-key --docker-server=839931787849.dkr.ecr.ap-south-1.amazonaws.com --docker-username=AWS --docker-password=$TOKEN --docker-email=none",
                    "sudo kubectl rollout restart deployment pr-bot"
                  ]'

